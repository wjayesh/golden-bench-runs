name: bench
on:
  workflow_dispatch:
    inputs:
      outcome:
        description: pass or fail
        required: true
        default: pass
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: outcome
        run: |
          if [ "${{ github.event.inputs.outcome }}" = "fail" ]; then
            echo "synthetic failure" && exit 1
          fi
          echo ok
